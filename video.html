    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --bg:#000; --surface:#111; --surface2:#1a1a1a; --border:#272727; --text:#e8e8e8; --text-dim:#999; --text-muted:#555; --white:#fff; --sidebar-w:110px; --topbar-h:60px; }
    html, body { height:100%; background:var(--bg); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:14px; overflow-x:hidden; }

    .sidebar { position:fixed; top:var(--topbar-h); left:0; width:var(--sidebar-w); height:calc(100vh - var(--topbar-h)); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; padding:16px 0; z-index:100; }
    .sidebar-nav { display:flex; flex-direction:column; align-items:center; gap:4px; width:100%; }
    .sidebar-btn { width:90px; height:67px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; background:none; border:none; color:#aaa; cursor:pointer; border-radius:10px; transition:background 0.15s,color 0.15s; font-family:'JetBrains Mono',monospace; font-size:15px; text-transform:lowercase; text-decoration:none; text-align:center; line-height:1.3; padding:0 4px; }
    .sidebar-btn:hover { background:var(--surface2); color:var(--white); }
    .sidebar-btn.active { color:var(--white); background:var(--surface2); }
    .sidebar-btn svg { width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }
    .page { margin-top:var(--topbar-h); margin-left:var(--sidebar-w); height:calc(100vh - var(--topbar-h)); display:flex; background:var(--bg); overflow:hidden; }
    .video-col { flex:1; overflow-y:auto; padding:24px 24px 40px; display:flex; flex-direction:column; gap:16px; }
    .video-container { position:relative; padding-bottom:56.25%; height:0; overflow:hidden; width:100%; border-radius:12px; }
    .video-container iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:0; }
    .video-meta { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 18px; }
    .video-meta h2 { font-size:1rem; font-weight:700; color:var(--white); margin-bottom:8px; line-height:1.5; }
    .video-stats { font-size:12px; color:var(--text-muted); margin-bottom:10px; }
    .channel-info { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
    .channel-info img { width:36px; height:36px; border-radius:50%; }
    .channel-name { font-size:13px; font-weight:600; color:var(--text-dim); }
    .video-description { font-size:12px; color:var(--text-muted); line-height:1.6; white-space:pre-wrap; margin-top:8px; }
    .chat-col { width:340px; flex-shrink:0; border-left:1px solid var(--border); display:flex; flex-direction:column; background:var(--surface); }
    .chat-controls { padding:12px 14px; border-bottom:1px solid var(--border); display:flex; gap:8px; flex-shrink:0; }
    .chat-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text-dim); padding:7px 12px; border-radius:7px; font-family:'JetBrains Mono',monospace; font-size:11px; cursor:pointer; transition:border-color 0.15s,color 0.15s; }
    .chat-btn:hover { border-color:#555; color:var(--white); }
    .chat-content { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; justify-content:flex-end; gap:2px; }
    .chat-message { font-size:12px; line-height:1.5; word-break:break-word; }
    .chat-message .emote { height:20px; vertical-align:middle; }
    @media (max-width:900px) { .sidebar { display:none; } .page { margin-left:0; flex-direction:column; height:auto; overflow:auto; } .chat-col { width:100%; border-left:none; border-top:1px solid var(--border); height:400px; } }

<body>
<header class="topbar"><a class="logo" href="index.html">vodstorage</a></header>
<aside class="sidebar">
  <nav class="sidebar-nav">
    <a class="sidebar-btn active" href="records.html" title="Записи"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>записи</a>
    <a class="sidebar-btn" href="calendar.html" title="Календарь"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>календарь</a>
    <a class="sidebar-btn" href="games.html" title="Игры"><svg viewBox="0 0 24 24"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><circle cx="15" cy="11" r="1"/><circle cx="17" cy="13" r="1"/><path d="M3 6h18l-2 13H5L3 6z"/></svg>игры</a>
    <a class="sidebar-btn" href="highlights.html" title="Моменты"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>моменты</a>
  </nav>
</aside>
<main class="page">
  <div class="video-col">
    <div class="video-container"><div id="player"></div></div>
    <div class="video-meta">
      <h2 id="video-title">загружается...</h2>
      <div class="video-stats" id="video-stats"></div>
      <div class="channel-info" id="channel-info"></div>
      <div class="video-description" id="video-description"></div>
    </div>
  </div>
  <div class="chat-col">
    <div class="chat-controls">
      <button class="chat-btn" id="toggle-emojis">7tv: вкл</button>
      <button class="chat-btn" id="toggle-chat">скрыть чат</button>
    </div>
    <div class="chat-content" id="chat-content">
      <p style="color:#555;font-size:12px">загрузка чата...</p>
    </div>
  </div>
</main>
<script>
const BASE = "https://neolegshishov.github.io/PwgoodChatRecords";
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}
async function loadInvidiousInfo(id) {
  try { const r = await fetch("https://razcraft.duckdns.org:6443/api/v1/videos/"+id); return r.ok ? r.json() : null; }
  catch(e) { return null; }
}
function renderMeta(info) {
  if (!info) return;
  document.getElementById("video-title").innerText = info.title || "без названия";
  document.getElementById("video-stats").innerText = ((info.viewCount||0).toLocaleString("ru-RU")) + " просмотров · " + new Date(info.published).toLocaleDateString("ru-RU");
  document.getElementById("channel-info").innerHTML = '<img src="'+(info.authorThumbnails?.[0]?.url||"")+'" alt=""><div class="channel-name">'+info.author+'</div>';
  document.getElementById("video-description").innerText = info.description || "";
}
let player, chatMessages = [], chatUpdateInterval, emotesEnabled = true, emotes = {};
const chatContent = document.getElementById("chat-content");
function scrollBottom() { chatContent.scrollTop = chatContent.scrollHeight; }
function parseTime(t) { return t.split(":").map(Number).reduce((a,b)=>a*60+b,0); }
async function loadChat(src) {
  chatContent.innerHTML = "<p style='color:#555;font-size:12px'>загрузка чата...</p>";
  clearInterval(chatUpdateInterval);
  try {
    const r = await fetch(src);
    let text;
    if (src.endsWith(".gz")) { const buf = await r.arrayBuffer(); text = pako.ungzip(new Uint8Array(buf),{to:"string"}); }
    else { text = await r.text(); }
    chatMessages = text.split("\n").map(line => {
      const m = line.match(/\[([0-9:]+)\] (.+?): (.+)/);
      return m ? {time:parseTime(m[1]),user:m[2],message:m[3]} : null;
    }).filter(Boolean);
    chatContent.innerHTML = ""; scrollBottom();
  } catch(e) { chatContent.innerHTML = "<p style='color:#555;font-size:12px'>ошибка загрузки чата</p>"; }
}
const emoteCache = {};
async function fetchEmotes() {
  if (Object.keys(emoteCache).length) { emotes = emoteCache; return; }
  try {
    const r = await fetch("https://7tv.io/v3/gql",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({query:"query EmoteSet{emoteSet(id:\"01FQTMFVT00000QXHG0DRS80W1\"){emotes{name data{host{url}}}}}"})});
    const d = await r.json();
    d.data.emoteSet.emotes.forEach(e => { emotes[e.name]="https:"+e.data.host.url+"/1x.webp"; });
    Object.assign(emoteCache, emotes);
  } catch(e) {}
}
function replaceEmotes(msg) {
  return msg.split(" ").map(w=>(emotesEnabled&&emotes[w])?"<img title='"+w+"' src='"+emotes[w]+"' alt='"+w+"' class='emote'>":w).join(" ");
}
function userColor(s) {
  let h=0; for(let i=0;i<s.length;i++) h=s.charCodeAt(i)+((h<<5)-h);
  let c="#"; for(let i=0;i<3;i++) c+=((h>>(i*8))&0xFF).toString(16).padStart(2,"0"); return c;
}
function syncChat(e) {
  if (e.data===YT.PlayerState.PLAYING) {
    chatUpdateInterval = setInterval(()=>{
      const cur = player.getCurrentTime();
      const visible = chatMessages.filter(m=>m.time<=cur).slice(-50);
      const existing = Array.from(chatContent.children).map(c=>c.dataset.mid);
      visible.forEach(m=>{
        if (!existing.includes(m.time.toString())) {
          const el = document.createElement("div"); el.className="chat-message"; el.dataset.mid=m.time.toString();
          el.innerHTML="<strong style='color:"+userColor(m.user)+"'>"+m.user+":</strong> "+replaceEmotes(m.message);
          chatContent.appendChild(el);
        }
      });
      Array.from(chatContent.children).filter(c=>!visible.find(m=>m.time.toString()===c.dataset.mid)).forEach(c=>chatContent.removeChild(c));
      scrollBottom();
    },100);
  } else if (e.data===YT.PlayerState.PAUSED) { clearInterval(chatUpdateInterval); }
}
async function findRecord(id) {
  for (let y=2022; y<=new Date().getFullYear(); y++) {
    try {
      const r = await fetch(BASE+"/"+y+"/livestreams.json");
      if (!r.ok) continue;
      const records = await r.json();
      const found = records.find(rec=>rec.id===id);
      if (found) return found;
    } catch(e) {}
  }
  return null;
}
const VIDEO_ID = getParam("id");
function onYouTubeIframeAPIReady() {
  if (!VIDEO_ID) { document.getElementById("player").innerText="видео не найдено"; return; }
  player = new YT.Player("player",{videoId:VIDEO_ID,events:{onReady:onReady,onStateChange:syncChat},playerVars:{autoplay:1}});
}
async function onReady(e) {
  const id = VIDEO_ID;
  loadInvidiousInfo(id).then(renderMeta);
  const rec = await findRecord(id);
  if (rec) {
    const chatUrl = rec.chat_path.startsWith("http") ? rec.chat_path : BASE+"/"+rec.chat_path;
    loadChat(chatUrl); fetchEmotes();
  } else { chatContent.innerHTML="<p style='color:#555;font-size:12px'>чат не найден</p>"; }
}
document.getElementById("toggle-emojis").addEventListener("click",function(){
  emotesEnabled=!emotesEnabled; this.textContent="7tv: "+(emotesEnabled?"вкл":"выкл"); chatContent.innerHTML=""; scrollBottom();
});
document.getElementById("toggle-chat").addEventListener("click",function(){
  const show=chatContent.style.display==="none"; chatContent.style.display=show?"":"none"; this.textContent=show?"скрыть чат":"показать чат";
});
</script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
