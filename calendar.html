  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root { --bg:#000; --surface:#111; --surface2:#1a1a1a; --border:#272727; --text:#e8e8e8; --text-dim:#999; --text-muted:#555; --white:#fff; --sidebar-w:110px; --topbar-h:60px; }

    .logo { height:var(--topbar-h); flex-shrink:0; display:flex; align-items:center; justify-content:center; text-decoration:none; font-family:'JetBrains Mono',monospace; font-weight:800; font-size:20px; color:var(--white); white-space:nowrap; letter-spacing:-0.5px; padding:0 24px; }
    .sidebar { position:fixed; top:var(--topbar-h); left:0; width:var(--sidebar-w); height:calc(100vh - var(--topbar-h)); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; padding:16px 0; z-index:100; }
    .sidebar-nav { display:flex; flex-direction:column; align-items:center; gap:4px; width:100%; }
    .sidebar-btn { width:90px; height:67px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; background:none; border:none; color:#aaa; cursor:pointer; border-radius:10px; transition:background 0.15s,color 0.15s; font-family:'JetBrains Mono',monospace; font-size:15px; text-transform:lowercase; text-decoration:none; text-align:center; line-height:1.3; padding:0 4px; }
    .sidebar-btn:hover { background:var(--surface2); color:var(--white); }
    .sidebar-btn.active { color:var(--white); background:var(--surface2); }
    .sidebar-btn svg { width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }
    .page { margin-top:var(--topbar-h); margin-left:var(--sidebar-w); min-height:calc(100vh - var(--topbar-h)); padding:32px 28px 56px; background:var(--bg); }
    .cal-header { display:flex; align-items:center; gap:20px; margin-bottom:24px; }
    .cal-nav { background:var(--surface); border:1px solid var(--border); color:var(--text-dim); width:38px; height:38px; border-radius:8px; cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:16px; display:flex; align-items:center; justify-content:center; transition:border-color 0.15s,color 0.15s; flex-shrink:0; }
    .cal-nav:hover { border-color:#555; color:var(--white); }
    .cal-title { font-size:1.5rem; font-weight:700; color:var(--white); letter-spacing:-0.5px; }
    .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; }
    .day-name { text-align:center; font-size:11px; font-weight:700; color:var(--text-muted); padding:8px 0; text-transform:uppercase; letter-spacing:0.8px; }
    .calendar-cell { min-height:120px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px; display:flex; flex-direction:column; overflow:hidden; transition:border-color 0.15s; }
    .calendar-cell.has-streams { border-color:#444; }
    .calendar-cell.empty { background:transparent; border-color:transparent; }
    .cell-date { font-size:12px; font-weight:700; color:var(--text-muted); margin-bottom:7px; }
    .calendar-cell.has-streams .cell-date { color:var(--text-dim); }
    .stream-entry { background:rgba(150,150,150,0.08); border-left:2px solid #555; padding:4px 7px; margin-bottom:5px; border-radius:4px; font-size:11px; line-height:1.4; overflow:hidden; }
    .stream-entry a { color:#bbb; text-decoration:none; display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .stream-entry a:hover { color:var(--white); }
    @media (max-width:600px) { .sidebar { display:none; } .page { margin-left:0; } .calendar-cell { min-height:80px; padding:6px; } .stream-entry { font-size:10px; } }

<body>
<header class="topbar"><a class="logo" href="index.html">vodstorage</a></header>
<aside class="sidebar">
  <nav class="sidebar-nav">
    <a class="sidebar-btn" href="records.html" title="Записи"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>записи</a>
    <a class="sidebar-btn active" href="calendar.html" title="Календарь"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>календарь</a>
    <a class="sidebar-btn" href="games.html" title="Игры"><svg viewBox="0 0 24 24"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><circle cx="15" cy="11" r="1"/><circle cx="17" cy="13" r="1"/><path d="M3 6h18l-2 13H5L3 6z"/></svg>игры</a>
    <a class="sidebar-btn" href="highlights.html" title="Моменты"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>моменты</a>
  </nav>
</aside>
<main class="page">
  <div class="cal-header">
    <button class="cal-nav" id="prevMonth">&#8592;</button>
    <span class="cal-title" id="monthTitle"></span>
    <button class="cal-nav" id="nextMonth">&#8594;</button>
  </div>
  <div class="calendar-grid" id="calendarGrid"></div>
</main>
<script>
const BASE = "https://neolegshishov.github.io/PwgoodChatRecords";
async function loadAllStreams() {
  let year = 2022, all = [];
  while (true) {
    try {
      const r = await fetch(BASE + "/" + year + "/livestreams.json");
      if (!r.ok) break;
      const arr = await r.json();
      if (Array.isArray(arr)) all = all.concat(arr);
    } catch(e) { break; }
    year++;
  }
  return all;
}
function parseDate(name) {
  const m = name.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  return m ? new Date(+m[3], m[2]-1, +m[1]) : null;
}
function groupByDate(streams) {
  const map = {};
  for (const s of streams) {
    const d = parseDate(s.name);
    if (!d) continue;
    const key = d.toISOString().slice(0,10);
    if (!map[key]) map[key] = [];
    map[key].push(s);
  }
  return map;
}
function renderCalendar(year, month, grouped) {
  const grid = document.getElementById("calendarGrid");
  const title = document.getElementById("monthTitle");
  grid.innerHTML = "";
  const months = ["январь","февраль","март","апрель","май","июнь","июль","август","сентябрь","октябрь","ноябрь","декабрь"];
  title.textContent = months[month] + " " + year;
  ["пн","вт","ср","чт","пт","сб","вс"].forEach(d => {
    const el = document.createElement("div"); el.className = "day-name"; el.textContent = d; grid.appendChild(el);
  });
  const startOffset = (new Date(year, month, 1).getDay() + 6) % 7;
  for (let i = 0; i < startOffset; i++) { const e = document.createElement("div"); e.className = "calendar-cell empty"; grid.appendChild(e); }
  const days = new Date(year, month+1, 0).getDate();
  for (let day = 1; day <= days; day++) {
    const cell = document.createElement("div");
    cell.className = "calendar-cell";
    const key = new Date(year, month, day).toISOString().slice(0,10);
    cell.innerHTML = '<div class="cell-date">'+day+'</div>';
    if (grouped[key]) {
      cell.classList.add("has-streams");
      grouped[key].forEach(s => {
        const div = document.createElement("div"); div.className = "stream-entry";
        const a = document.createElement("a");
        a.href = "video.html?id=" + s.id;
        a.target = "_blank";
        a.textContent = s.name.replace(/^\d{1,2}\.\d{1,2}\.\d{4}\s*\|\s*/,"");
        div.appendChild(a); cell.appendChild(div);
      });
    }
    grid.appendChild(cell);
  }
}
(async function() {
  const streams = await loadAllStreams();
  const grouped = groupByDate(streams);
  const now = new Date();
  let year = now.getFullYear(), month = now.getMonth();
  function update() { renderCalendar(year, month, grouped); }
  document.getElementById("prevMonth").onclick = () => { month--; if (month < 0) { month=11; year--; } update(); };
  document.getElementById("nextMonth").onclick = () => { month++; if (month > 11) { month=0; year++; } update(); };
  update();
})();
</script>
</body>
